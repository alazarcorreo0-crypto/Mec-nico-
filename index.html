<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablet de Diagnóstico Automotriz</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
        }

        body {
            background-color: #0d0f12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .tablet-container {
            width: 100%;
            max-width: 1100px;
            height: 700px;
            background-color: #14181f;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 4px solid #232a36;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background-color: #0b0d11;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 20px;
            border-right: 1px solid #1c232e;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #3b82f6;
        }

        .brand h2 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 30px 0;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #64748b;
            padding: 14px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 15px;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .menu-btn:hover {
            background-color: #1c232e;
            color: #f8fafc;
        }

        .menu-btn.active {
            background-color: #3b82f6;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .mechanic-info {
            border-top: 1px solid #1c232e;
            padding-top: 20px;
        }

        .mechanic-info .role {
            font-size: 11px;
            color: #475569;
            text-transform: uppercase;
            font-weight: 700;
        }

        .mechanic-info .name {
            font-size: 16px;
            color: #e2e8f0;
            font-weight: 600;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            background-color: #14181f;
            justify-content: space-between;
            overflow: hidden;
        }

        .vehicle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1c232e;
            padding-bottom: 20px;
            flex-shrink: 0;
        }

        .vehicle-header h1 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 700;
        }

        .vehicle-header .subheader {
            color: #64748b;
            font-size: 14px;
            margin-top: 4px;
        }

        .vehicle-badge {
            background-color: #1c232e;
            padding: 10px 18px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .vehicle-badge .plate {
            color: #fbbf24;
            font-weight: 700;
            font-size: 15px;
        }

        .vehicle-badge .model {
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
        }

        /* CONTENEDOR DINÁMICO DE PESTAÑAS */
        .tab-content {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 25px;
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* DISEÑO DE TARJETAS */
        .card {
            background-color: #1c232e;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-left: 6px solid #64748b;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateX(4px);
        }

        .card-icon {
            background-color: #242f3e;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .card-icon span {
            font-size: 32px;
        }

        .card-info {
            flex: 1;
        }

        .card-info h3 {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
        }

        .card-info .status-text {
            font-size: 13px;
            margin-top: 2px;
            font-weight: 600;
        }

        .card-info .hint {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 6px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #0b0d11;
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            border-radius: 4px;
        }

        /* SELECTORES PARA OPCIONES DE TUNING Y BOTONES INTERNOS */
        .tuning-options {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .select-btn {
            background-color: #242f3e;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .select-btn:hover {
            background-color: #334155;
        }

        .select-btn.selected {
            background-color: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        /* COLORES DINÁMICOS */
        .card.critical { border-left-color: #ef4444; }
        .card.critical .status-text { color: #ef4444; }
        .card.critical .progress { background-color: #ef4444; }
        .card.critical .card-icon { color: #ef4444; }

        .card.warning { border-left-color: #f59e0b; }
        .card.warning .status-text { color: #f59e0b; }
        .card.warning .progress { background-color: #f59e0b; }
        .card.warning .card-icon { color: #f59e0b; }

        .card.healthy { border-left-color: #10b981; }
        .card.healthy .status-text { color: #10b981; }
        .card.healthy .progress { background-color: #10b981; }
        .card.healthy .card-icon { color: #10b981; }

        .action-footer {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            border-top: 1px solid #1c232e;
            padding-top: 20px;
            margin-top: 15px;
            flex-shrink: 0;
        }

        button.btn-primary, button.btn-secondary {
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
        }

        button.btn-secondary {
            background: none;
            border: 1px solid #334155;
            color: #94a3b8;
        }

        button.btn-secondary:hover {
            background-color: #1c232e;
            color: #ffffff;
        }

        button.btn-primary {
            background-color: #10b981;
            border: none;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        button.btn-primary:hover {
            background-color: #059669;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="tablet-container">
        
        <aside class="sidebar">
            <div class="brand">
                <span class="material-icons-round">analytics</span>
                <h2>PERFORMANCE</h2>
            </div>
            
            <nav class="menu">
                <button class="menu-btn active" onclick="switchTab('diagnostico', this)">
                    <span class="material-icons-round">build_circle</span>
                    Diagnóstico
                </button>
                <button class="menu-btn" onclick="switchTab('mantenimiento', this)">
                    <span class="material-icons-round">oil_barrel</span>
                    Mantenimiento
                </button>
                <button class="menu-btn" onclick="switchTab('personalizacion', this)">
                    <span class="material-icons-round">palette</span>
                    Personalización
                </button>
                <button class="menu-btn" onclick="switchTab('rendimiento', this)">
                    <span class="material-icons-round">speed</span>
                    Rendimiento
                </button>
            </nav>

            <div class="mechanic-info">
                <p class="role">Mecánico Activo</p>
                <p class="name">El Ingeniero</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="vehicle-header">
                <div>
                    <h1 id="tab-title">Escáner de Sistema</h1>
                    <p class="subheader" id="tab-subtitle">Vehículo detectado en bahía de servicio</p>
                </div>
                <div class="vehicle-badge">
                    <span class="plate">PLACA: 46XAN82</span>
                    <span class="model">Sultan RS</span>
                </div>
            </header>

            <section class="tab-content" id="dynamic-content">
                </section>

            <footer class="action-footer">
                <button class="btn-secondary" onclick="alert('Escaneo cancelado de la tablet')">Cancelar Escaneo</button>
                <button class="btn-primary" onclick="alert('¡Orden enviada! Pasa con el tendero de la tienda a recoger tus materiales genéricos.')">
                    <span class="material-icons-round">shopping_cart</span>
                    Generar Orden al Almacén
                </button>
            </footer>
        </main>

    </div>

    <script>
        // Objeto de datos que simula lo que después leeremos de FiveM
        const pantallas = {
            diagnostico: `
                <div class="card critical">
                    <div class="card-icon"><span class="material-icons-round">propulsion_line</span></div>
                    <div class="card-info">
                        <h3>Módulo de Motor</h3>
                        <p class="status-text">Estado Crítico (35%)</p>
                        <div class="progress-bar"><div class="progress" style="width: 35%;"></div></div>
                        <p class="hint">Requiere: 1x Kit de Motor (Filtros, bujías o fluidos rotos)</p>
                    </div>
                </div>
                <div class="card warning">
                    <div class="card-icon"><span class="material-icons-round">tire_repair</span></div>
                    <div class="card-info">
                        <h3>Sistema de Frenos</h3>
                        <p class="status-text">Desgaste Medio (60%)</p>
                        <div class="progress-bar"><div class="progress" style="width: 60%;"></div></div>
                        <p class="hint">Requiere: 1x Kit de Frenos (Balatas desgastadas)</p>
                    </div>
                </div>
                <div class="card healthy">
                    <div class="card-icon"><span class="material-icons-round">settings_input_component</span></div>
                    <div class="card-info">
                        <h3>Caja de Cambios</h3>
                        <p class="status-text">Óptimo (98%)</p>
                        <div class="progress-bar"><div class="progress" style="width: 98%;"></div></div>
                        <p class="hint">Configuración actual del chasis: AWD</p>
                    </div>
                </div>
            `,
            mantenimiento: `
                <div class="card warning">
                    <div class="card-icon"><span class="material-icons-round">opacity</span></div>
                    <div class="card-info">
                        <h3>Calidad del Aceite Sintético</h3>
                        <p class="status-text">Vida útil: 18% (Cambio requerido)</p>
                        <div class="progress-bar"><div class="progress" style="width: 18%;"></div></div>
                        <p class="hint">Requiere: 1x Kit de Motor para purga y afinación</p>
                    </div>
                </div>
                <div class="card healthy">
                    <div class="card-icon"><span class="material-icons-round">water_drop</span></div>
                    <div class="card-info">
                        <h3>Líquido de Frenos</h3>
                        <p class="status-text">Nivel Óptimo (90%)</p>
                        <div class="progress-bar"><div class="progress" style="width: 90%;"></div></div>
                        <p class="hint">Presión hidráulica estable en las 4 líneas</p>
                    </div>
                </div>
            `,
            personalizacion: `
                <div class="card healthy">
                    <div class="card-icon"><span class="material-icons-round">palette</span></div>
                    <div class="card-info">
                        <h3>Pintura de Carrocería y Rines</h3>
                        <p class="status-text">Habilita el rociador RGB en el taller</p>
                        <p class="hint">Gasta: 1x Lata de Pintura Universal al aplicar</p>
                        <div class="tuning-options">
                            <button class="select-btn selected" onclick="selectOpt(this)">Color Principal (Mate)</button>
                            <button class="select-btn" onclick="selectOpt(this)">Color Secundario (Metálico)</button>
                            <button class="select-btn" onclick="selectOpt(this)">Pintar Rines</button>
                        </div>
                    </div>
                </div>
                <div class="card healthy">
                    <div class="card-icon"><span class="material-icons-round">sports_motorsports</span></div>
                    <div class="card-info">
                        <h3>Catálogo de Accesorios Estéticos</h3>
                        <p class="status-text">Detección automática de mods para Sultan RS</p>
                        <p class="hint">Gasta: 1x Kit de Accesorios por pieza montada</p>
                        <div class="tuning-options">
                            <button class="select-btn" onclick="selectOpt(this)">Alerón de Carbono (Mod 1)</button>
                            <button class="select-btn" onclick="selectOpt(this)">Faldones de Carreras (Mod 3)</button>
                            <button class="select-btn" onclick="selectOpt(this)">Accesorio de Tablero (Sombrero)</button>
                        </div>
                    </div>
                </div>
            `,
            rendimiento: `
                <div class="card healthy">
                    <div class="card-icon"><span class="material-icons-round">published_with_changes</span></div>
                    <div class="card-info">
                        <h3>Modificación de Tracción (Caja de Transferencia)</h3>
                        <p class="status-text">Cambia la distribución de torque en tiempo real</p>
                        <p class="hint">Requiere: 2x Kit de Transmisión para reprogramar el chasis</p>
                        <div class="tuning-options">
                            <button class="select-btn" onclick="selectOpt(this)">Delantera (FWD)</button>
                            <button class="select-btn" onclick="selectOpt(this)">Trasera (RWD / Drift)</button>
                            <button class="select-btn selected" onclick="selectOpt(this)">Integral (AWD / Grip)</button>
                        </div>
                    </div>
                </div>
                <div class="card warning">
                    <div class="card-icon"><span class="material-icons-round">speed</span></div>
                    <div class="card-info">
                        <h3>Mapeo de Motor (Reprogramación de ECU)</h3>
                        <p class="status-text">Nivel actual del chip: Stock</p>
                        <p class="hint">Requiere: 3x Kit de Motor para subir a Fase 3 (+30 HP)</p>
                        <div class="tuning-options">
                            <button class="select-btn selected" onclick="selectOpt(this)">Fase 1 (Stock)</button>
                            <button class="select-btn" onclick="selectOpt(this)">Fase 2 (Sport)</button>
                            <button class="select-btn" onclick="selectOpt(this)">Fase 3 (Racing)</button>
                        </div>
                    </div>
                </div>
            `
        };

        // Títulos dinámicos superiores
        const titulos = {
            diagnostico: { t: "Escáner de Sistema", s: "Vehículo detectado en bahía de servicio" },
            mantenimiento: { t: "Fluidos y Desgaste", s: "Control de mantenimiento preventivo por kilometraje" },
            personalizacion: { t: "Catálogo Visual y Estética", s: "Instalación de accesorios y detallado de pintura" },
            rendimiento: { t: "Configuración de Performance", s: "Modificaciones mecánicas avanzadas y tracción" }
        };

        // Función para cambiar de pestaña al dar clic
        function switchTab(tabName, element) {
            // 1. Quitar la clase activa de todos los botones de navegación
            const buttons = document.querySelectorAll('.menu-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // 2. Ponerle la clase activa al botón que picamos
            element.classList.add('active');
            
            // 3. Cambiar los textos de la parte de arriba
            document.getElementById('tab-title').innerText = titulos[tabName].t;
            document.getElementById('tab-subtitle').innerText = titulos[tabName].s;
            
            // 4. Inyectar el HTML simulado de esa sección
            document.getElementById('dynamic-content').innerHTML = pantallas[tabName];
        }

        // Función interactiva para prender/apagar opciones internas (los botones de tuning)
        function selectOpt(btn) {
            // Buscar los botones hermanos dentro de la misma tarjeta y quitar selección
            const parent = btn.parentElement;
            const buttons = parent.querySelectorAll('.select-btn');
            buttons.forEach(b => b.classList.remove('selected'));
            
            // Seleccionar el botón al que se le dio clic
            btn.classList.add('selected');
        }

        // Cargar por defecto la primera pantalla al iniciar
        document.getElementById('dynamic-content').innerHTML = pantallas['diagnostico'];
    </script>
</body>
</html>
